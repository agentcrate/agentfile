version: "2"

linters:
  default: standard
  enable:
    - misspell
    - revive
    - gocritic

  settings:
    revive:
      rules:
        # `exported` enforces godoc on public surface. agentfile is consumed
        # by `crate` and `crated`, so doc-comment regressions break two
        # downstream contracts; tighten the rule beyond defaults:
        #   - checkPrivateReceivers: also flag undocumented private receivers
        #     when their method has an exported name.
        #   - sayRepetitiveInsteadOfStutters: keep the "Foo.Foo" stutter
        #     warning but use the clearer wording.
        #   - checkPublicInterface: enforce comments on exported interfaces.
        - name: exported
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"
            - "checkPublicInterface"
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    misspell:
      locale: US

  exclusions:
    rules:
      # Narrow the test-file relaxation: only suppress the specific noise we
      # know is harmless rather than disabling whole linters. Blanket
      # `errcheck`/`gocritic` exclusion was masking real bugs (ignored
      # Close() in cleanup, gocritic dupSubExpr in assertions, t.Setenv
      # error swallow).
      - path: _test\.go
        linters:
          - errcheck
        text: 'Close\(\)|Setenv'

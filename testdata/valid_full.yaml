version: "1"

metadata:
  name: compliance-monitor
  version: "1.0.0"
  description: "Monitors regulatory compliance changes and alerts stakeholders."
  author: "AgentCrate Team"
  license: Apache-2.0
  tags:
    - compliance
    - monitoring
    - regulatory

brain:
  default: gpt
  models:
    - name: gpt
      model: openai/gpt-4o
      temperature: 0.3
      max_tokens: 4096
    - name: local
      model: ollama/llama3
      temperature: 0.7
      max_tokens: 2048

persona:
  system_prompt: |
    You are a compliance monitoring agent. Your job is to track regulatory
    changes, analyze their impact, and generate alerts for affected teams.
  name: ComplianceBot
  role: Compliance Analyst

skills:
  - name: sec-data
    type: http
    source: https://mcp.sec.gov/v1
    description: "SEC EDGAR data feed"
  - name: slack-notify
    type: http
    source: https://mcp.slack.com/v1
    description: "Slack notification service"
  - name: search
    type: mcp
    source: cratehub.ai/tools/web-search

policies:
  allowed_domains:
    - sec.gov
    - slack.com
  human_in_the_loop:
    - tool: slack-notify
      condition: always
  tool_permissions:
    - skill: sec-data
      allow:
        - read
    - skill: slack-notify
      allow:
        - send_message
  max_tokens: 100000
  max_turns: 50

profiles:
  dev:
    brain:
      default: local
  prod:
    brain:
      default: gpt
    policies:
      max_tokens: 500000

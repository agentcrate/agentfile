name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            chore
            refactor
            perf
            ci
            build
            style
            revert
          scopes: |
            cli
            agentfile
            builder
            runtime
            registry
            signer
            config
            playground
            profiles
            deps
            release
            ci
            build
            docs
            test
            security
            version
            policy
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: |
            PR title must follow Conventional Commits format:
            type(scope): description

            Examples:
              feat(cli): add shell completion for PowerShell
              fix(agentfile): handle missing metadata section
              docs: update installation instructions
              chore(deps): bump cobra to v1.8.1

name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            chore
            refactor
            perf
            ci
            build
            style
            revert
          scopes: |
            cli
            agentfile
            builder
            runtime
            registry
            signer
            config
            playground
            profiles
            deps
            release
            ci
            build
            docs
            test
            security
            version
            policy
          requireScope: false
          # Subject must start with a lowercase letter and be at least ten
          # characters (rejects placeholders like "WIP" or "fix bug"). It
          # must not end with a period. The previous `^.+$` was equivalent
          # to no pattern at all.
          subjectPattern: ^[a-z].{9,}[^.]$
          subjectPatternError: |
            PR title subject must:
              - start with a lowercase letter
              - be at least ten characters long
              - not end with a period

            Examples:
              feat(cli): add shell completion for PowerShell
              fix(agentfile): handle missing metadata section
              docs: update installation instructions
              chore(deps): bump cobra to v1.8.1

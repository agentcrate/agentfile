# Release — create a GitHub Release when a semver tag is pushed.
#
# agentfile is a Go library consumed via `go get`, so releases are
# just GitHub Releases with auto-generated changelogs. No binaries.
#
# Tag examples:
#   git tag v0.1.0 && git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Verify the module builds and tests pass at the tagged commit.
      - name: Verify
        run: |
          go build ./...
          go test -race ./...

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
